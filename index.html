<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Dearest Tannu Priya ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="login">

<h1>💖 Welcome My Love 💖</h1>

<p class="subtitle">
Every heartbeat of mine belongs to you ❤️
</p>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="checkPassword()">
💌 Open My Heart
</button>

<p id="error"></p>

</div>

<div id="website">

<header>

<h1>
💕 For My Dearest Tannu Priya 💕
</h1>

<p id="counter"></p>

</header>

<section class="letter">

<h2>💌 My Love Letter</h2>

<div class="love-letter">

<h2>💌 A Letter For My Dearest Tannu Priya 💌</h2>

<div id="typing" class="letter-box"></div>

</div>

</section>

<section class="photos">

<h2>📸 Our Memories</h2>
<div id="gallery">
    <img src="Images/IMG_20260413_190830_627.jpg" class="photo">
    <img src="Images/IMG_20260702_154955.jpg" class="photo">
    <img src="Images/IMG_20260702_171919.jpg" class="photo">
    <img src="Images/IMG_20260706_225248.jpg" class="photo">
</div>


</section>

<section class="music">

<h2>🎵 Our Song</h2>

<input
type="file"
id="musicUpload"
accept="audio/*">

<audio
id="player"
controls
loop></audio>

</section>

<footer>

❤️ Together Forever ❤️

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
